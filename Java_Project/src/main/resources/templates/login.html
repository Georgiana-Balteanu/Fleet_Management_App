<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="auth-title">Autentificare</h2>
        <p class="auth-subtitle">Intră în contul tău Fleet Management</p>

        <div th:if="${param.error}" class="alert-error">
            Utilizator sau parolă incorectă.
        </div>

        <div th:if="${param.logout}" class="msg">
            Te-ai delogat cu succes.
        </div>

        <form th:action="@{/login}" method="post">
            <label for="username">Utilizator</label>
            <input id="username" type="text" name="username" required>

            <label for="password">Parolă</label>
            <input id="password" type="password" name="password" required>

            <button type="submit" class="btn-primary">Login</button>
        </form>
    </div>
</div>
</body>
</html>
